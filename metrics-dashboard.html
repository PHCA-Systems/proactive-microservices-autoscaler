<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenTelemetry Demo - Real-time Metrics Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #1a1a1a;
            color: #ffffff;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
        }
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .metric-card {
            background: #2d2d2d;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            border-left: 4px solid #4CAF50;
        }
        .metric-card.error {
            border-left-color: #f44336;
        }
        .metric-card.warning {
            border-left-color: #ff9800;
        }
        .service-name {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 15px;
            color: #4CAF50;
        }
        .metric {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            padding: 5px 0;
        }
        .metric-label {
            color: #cccccc;
        }
        .metric-value {
            font-weight: bold;
            color: #ffffff;
        }
        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }
        .status-up { background-color: #4CAF50; }
        .status-down { background-color: #f44336; }
        .status-warning { background-color: #ff9800; }
        .refresh-info {
            text-align: center;
            margin-top: 20px;
            color: #888;
            font-size: 0.9em;
        }
        .links {
            text-align: center;
            margin-top: 30px;
            padding: 20px;
            background: #2d2d2d;
            border-radius: 10px;
        }
        .links a {
            color: #4CAF50;
            text-decoration: none;
            margin: 0 15px;
            padding: 8px 16px;
            background: #3d3d3d;
            border-radius: 5px;
            transition: background 0.3s;
        }
        .links a:hover {
            background: #4d4d4d;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔍 OpenTelemetry Demo - Real-time Metrics Dashboard</h1>
        <p>Live monitoring of microservices with load generation</p>
    </div>

    <div class="dashboard" id="dashboard">
        <!-- Service metrics will be loaded here -->
    </div>

    <div class="links">
        <a href="http://localhost:9090" target="_blank">Prometheus</a>
        <a href="http://localhost:8080/grafana/" target="_blank">Grafana</a>
        <a href="http://localhost:32821" target="_blank">Load Generator</a>
        <a href="http://localhost:16686" target="_blank">Jaeger</a>
        <a href="http://localhost:8080" target="_blank">Frontend</a>
    </div>

    <div class="refresh-info">
        <p>Auto-refreshing every 10 seconds | Last updated: <span id="lastUpdate"></span></p>
    </div>

    <script>
        const services = [
            'frontend', 'cart', 'checkout', 'product-catalog', 
            'payment', 'shipping', 'recommendation', 'ad', 'currency'
        ];

        const serviceNames = {
            'frontend': 'Frontend Service',
            'cart': 'Cart Service',
            'checkout': 'Checkout Service',
            'product-catalog': 'Product Catalog',
            'payment': 'Payment Service',
            'shipping': 'Shipping Service',
            'recommendation': 'Recommendation',
            'ad': 'Ad Service',
            'currency': 'Currency Service'
        };

        async function fetchMetric(query) {
            try {
                const response = await fetch(`http://localhost:9090/api/v1/query?query=${encodeURIComponent(query)}`);
                const data = await response.json();
                if (data.status === 'success' && data.data.result.length > 0) {
                    return parseFloat(data.data.result[0].value[1]);
                }
            } catch (error) {
                console.error('Error fetching metric:', error);
            }
            return 0;
        }

        async function getServiceMetrics(service) {
            const [requestRate, errorRate, avgDuration, totalCalls] = await Promise.all([
                fetchMetric(`rate(traces_span_metrics_calls_total{service_name="${service}"}[5m])`),
                fetchMetric(`rate(traces_span_metrics_calls_total{service_name="${service}",span_status_code="ERROR"}[5m])`),
                fetchMetric(`histogram_quantile(0.95, rate(traces_span_metrics_duration_milliseconds_bucket{service_name="${service}"}[5m]))`),
                fetchMetric(`sum(traces_span_metrics_calls_total{service_name="${service}"})`)
            ]);

            return {
                requestRate: requestRate.toFixed(2),
                errorRate: errorRate.toFixed(2),
                avgDuration: avgDuration.toFixed(0),
                totalCalls: Math.round(totalCalls),
                status: errorRate > 0 ? 'warning' : 'up'
            };
        }

        async function getLoadGeneratorStats() {
            try {
                const response = await fetch('http://localhost:32821/stats/requests');
                const data = await response.json();
                return {
                    users: data.user_count || 0,
                    rps: data.current_rps || 0,
                    totalRequests: data.num_requests || 0,
                    failures: data.num_failures || 0
                };
            } catch (error) {
                return { users: 0, rps: 0, totalRequests: 0, failures: 0 };
            }
        }

        function createMetricCard(service, metrics) {
            const statusClass = metrics.status === 'up' ? '' : metrics.status === 'warning' ? 'warning' : 'error';
            const statusIcon = metrics.status === 'up' ? 'status-up' : metrics.status === 'warning' ? 'status-warning' : 'status-down';
            
            return `
                <div class="metric-card ${statusClass}">
                    <div class="service-name">
                        <span class="status-indicator ${statusIcon}"></span>
                        ${serviceNames[service] || service}
                    </div>
                    <div class="metric">
                        <span class="metric-label">Requests/sec:</span>
                        <span class="metric-value">${metrics.requestRate}</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Error rate:</span>
                        <span class="metric-value">${metrics.errorRate}</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Avg Duration:</span>
                        <span class="metric-value">${metrics.avgDuration}ms</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Total Calls:</span>
                        <span class="metric-value">${metrics.totalCalls}</span>
                    </div>
                </div>
            `;
        }

        function createLoadGeneratorCard(stats) {
            return `
                <div class="metric-card">
                    <div class="service-name">
                        <span class="status-indicator status-up"></span>
                        Load Generator
                    </div>
                    <div class="metric">
                        <span class="metric-label">Active Users:</span>
                        <span class="metric-value">${stats.users}</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Current RPS:</span>
                        <span class="metric-value">${stats.rps}</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Total Requests:</span>
                        <span class="metric-value">${stats.totalRequests}</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Failures:</span>
                        <span class="metric-value">${stats.failures}</span>
                    </div>
                </div>
            `;
        }

        async function updateDashboard() {
            const dashboard = document.getElementById('dashboard');
            const lastUpdate = document.getElementById('lastUpdate');
            
            try {
                // Get load generator stats
                const loadStats = await getLoadGeneratorStats();
                const loadCard = createLoadGeneratorCard(loadStats);
                
                // Get service metrics
                const serviceMetrics = await Promise.all(
                    services.map(async (service) => {
                        const metrics = await getServiceMetrics(service);
                        return createMetricCard(service, metrics);
                    })
                );
                
                dashboard.innerHTML = loadCard + serviceMetrics.join('');
                lastUpdate.textContent = new Date().toLocaleTimeString();
                
            } catch (error) {
                console.error('Error updating dashboard:', error);
                dashboard.innerHTML = '<div class="metric-card error"><div class="service-name">Error loading metrics</div><div class="metric"><span class="metric-label">Message:</span><span class="metric-value">Unable to connect to Prometheus</span></div></div>';
            }
        }

        // Initial load and set up auto-refresh
        updateDashboard();
        setInterval(updateDashboard, 10000);

        // Add some visual feedback for updates
        document.addEventListener('DOMContentLoaded', function() {
            console.log('OpenTelemetry Demo Metrics Dashboard loaded');
            console.log('Load generator should be creating traffic to generate metrics');
        });
    </script>
</body>
</html>
