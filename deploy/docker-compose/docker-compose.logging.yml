version: '2'

services:
  elasticsearch:
    image: elasticsearch:7.17.0
    hostname: elasticsearch
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
  kibana:
    image: kibana:7.17.0
    hostname: kibana
    depends_on:
      - elasticsearch
    ports:
      - '5601:5601'
  log-server:
    image: weaveworksdemos/log-server
    hostname: log-server
    depends_on:
      - elasticsearch
    ports:
      - '24224:24224'
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "24224"]
      interval: 10s
      timeout: 5s
      retries: 5
  front-end:
    logging:
      driver: fluentd
      options:
        fluentd-address: localhost:24224
        tag: "{{.Name}}"
    depends_on:
      log-server:
        condition: service_healthy
  edge-router:
    logging:
      driver: fluentd
    depends_on:
      - log-server
  catalogue:
    logging:
      driver: fluentd
    depends_on:
      - log-server
  catalogue-db:
    logging:
      driver: fluentd
    depends_on:
      - log-server
  carts:
    logging:
      driver: fluentd
    depends_on:
      - log-server
  carts-db:
    logging:
      driver: fluentd
    depends_on:
      - log-server
  orders:
    logging:
      driver: fluentd
    depends_on:
      - log-server
  orders-db:
    logging:
      driver: fluentd
    depends_on:
      - log-server
  shipping:
    logging:
      driver: fluentd
    depends_on:
      - log-server
  queue-master:
    logging:
      driver: fluentd
    depends_on:
      - log-server
  rabbitmq:
    logging:
      driver: fluentd
    depends_on:
      - log-server
  payment:
    logging:
      driver: fluentd
    depends_on:
      - log-server
  user:
    logging:
      driver: fluentd
    depends_on:
      - log-server
  user-db:
    logging:
      driver: fluentd
    depends_on:
      - log-server
  user-sim:
    logging:
      driver: fluentd
    depends_on:
      - log-server
