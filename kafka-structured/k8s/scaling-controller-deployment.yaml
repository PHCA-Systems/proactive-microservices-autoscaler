apiVersion: apps/v1
kind: Deployment
metadata:
  name: scaling-controller
  namespace: kafka
spec:
  replicas: 0
  selector:
    matchLabels:
      app: scaling-controller
  template:
    metadata:
      labels:
        app: scaling-controller
    spec:
      containers:
      - name: controller
        image: gcr.io/grad-phca/scaling-controller:latest
        env:
        - name: NAMESPACE
          value: "sock-shop"
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "kafka:9092"
        - name: SLO_THRESHOLD_MS
          value: "36.0"
        - name: SCALE_EVENT_LOG
          value: "/logs/scale_events.jsonl"
        - name: COOLDOWN_MINUTES
          value: "5"
        - name: MIN_REPLICAS
          value: "1"
        - name: MAX_REPLICAS
          value: "10"
        - name: SCALEDOWN_CPU_PCT
          value: "30.0"
        - name: SCALEDOWN_LAT_RATIO
          value: "0.7"
        - name: SCALEDOWN_WINDOW
          value: "10"
        - name: KUBECONFIG
          value: "/kubeconfig/config"
        - name: KUBECTL_CONTEXT
          value: "sock-shop-cluster"
        volumeMounts:
        - name: logs
          mountPath: /logs
        - name: kubeconfig
          mountPath: /kubeconfig
          readOnly: true
      volumes:
      - name: logs
        emptyDir: {}
      - name: kubeconfig
        secret:
          secretName: sock-shop-kubeconfig
