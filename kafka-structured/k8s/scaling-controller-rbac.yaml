apiVersion: v1
kind: ServiceAccount
metadata:
  name: scaling-controller-sa
  namespace: sock-shop
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: scaling-controller-role
  namespace: sock-shop
rules:
- apiGroups: ["apps"]
  resources: ["deployments", "deployments/scale"]
  verbs: ["get", "list", "patch", "update"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: scaling-controller-binding
  namespace: sock-shop
subjects:
- kind: ServiceAccount
  name: scaling-controller-sa
  namespace: sock-shop
roleRef:
  kind: Role
  name: scaling-controller-role
  apiGroup: rbac.authorization.k8s.io
