apiVersion: v1
kind: Service
metadata:
  name: prometheus-server-external
  namespace: monitoring
  labels:
    app: prometheus
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/instance: prometheus
  ports:
  - name: http
    port: 9090
    targetPort: 9090
    protocol: TCP
