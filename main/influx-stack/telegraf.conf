# Telegraf Configuration for PHCA

[global_tags]
  environment = "phca-research"

[agent]
  interval = "5s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "5s"
  flush_jitter = "0s"
  precision = ""
  hostname = ""
  omit_hostname = false

# Docker input plugin
[[inputs.docker]]
  endpoint = "unix:///var/run/docker.sock"
  gather_services = false
  container_names = []
  source_tag = false
  # Monitor all containers, but we'll filter for sock shop ones
  container_name_include = []
  container_state_include = ["running"]
  perdevice = true
  total = false

# InfluxDB v2 output
[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "phca-token-12345"
  organization = "phca"
  bucket = "microservices"

# Optional: Log output for debugging
[[outputs.file]]
  files = ["/tmp/telegraf-metrics.out"]
  data_format = "influx"